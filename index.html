<!DOCTYPE html>
<html lang="en">

<script>
if (typeof msal === 'undefined') {
  document.write('<script src="https://unpkg.com/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"><\/script>');

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;color:#cbd5e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.header{background:linear-gradient(to right,#0f172a,#1e293b,#0f172a);border-bottom:1px solid rgba(71,85,105,0.5);padding:20px 24px}
.header-inner{max-width:1400px;margin:0 auto}
.header-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px}
h1{font-size:24px;font-weight:700;color:white;letter-spacing:-0.5px}
.subtitle{font-size:13px;color:#64748b;margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px}
.auth-area{display:flex;align-items:center;gap:10px}
.auth-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s}
.auth-btn.login{background:#2563eb;color:white}
.auth-btn.login:hover{background:#1d4ed8}
.auth-btn.logout{background:#334155;color:#94a3b8}
.auth-btn.logout:hover{background:#475569;color:white}
.user-name{font-size:13px;color:#94a3b8}
.refresh-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px}
.refresh-btn:hover{border-color:#3b82f6;color:white}
.refresh-btn.spinning svg{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.status-bar{display:flex;align-items:center;gap:12px;margin-top:12px;font-size:12px;color:#64748b}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.green{background:#10b981}
.status-dot.yellow{background:#f59e0b}
.status-dot.red{background:#ef4444}
.gmv-bar{display:flex;align-items:center;gap:4px;background:#0f172a;border-radius:8px;padding:4px;border:1px solid #334155}
.gmv-btn{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;background:transparent;color:#94a3b8}
.gmv-btn:hover{color:white}
.gmv-btn.active{background:#2563eb;color:white;box-shadow:0 2px 8px rgba(37,99,235,0.3)}
.gmv-label{font-size:11px;opacity:0.7}
.gmv-val{font-size:18px;font-weight:700}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.tab{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;background:#1e293b;color:#94a3b8}
.tab:hover{background:#334155;color:white}
.tab.active{background:#2563eb;color:white;box-shadow:0 4px 12px rgba(37,99,235,0.25)}
.content{max-width:1400px;margin:0 auto;padding:24px}
.toggles{display:flex;flex-wrap:wrap;gap:24px;margin-bottom:24px;align-items:center}
.toggle-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:#94a3b8;font-size:14px;cursor:pointer;transition:color 0.2s}
.toggle-btn:hover{color:white}
.toggle-btn.on{color:#60a5fa}
.toggle-ind{width:36px;height:20px;border-radius:10px;position:relative;transition:all 0.2s}
.toggle-ind.off{background:#334155}
.toggle-ind.on{background:#2563eb}
.toggle-ind::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:white;top:2px;transition:all 0.2s}
.toggle-ind.off::after{left:2px}
.toggle-ind.on::after{left:18px}
.meta{margin-left:auto;font-size:12px;color:#475569}
.grid{display:grid;gap:12px;margin-bottom:24px}
.grid-8{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.grid-6{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:24px;margin-bottom:24px}
.kpi{background:rgba(30,41,59,0.8);backdrop-filter:blur(8px);border:1px solid rgba(71,85,105,0.5);border-radius:12px;padding:16px;transition:all 0.2s}

.kpi-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.kpi-value{font-size:20px;font-weight:700;color:white}
.kpi-sub{font-size:12px;color:#64748b;margin-top:4px}
.card{background:rgba(30,41,59,0.6);backdrop-filter:blur(12px);border:1px solid rgba(71,85,105,0.5);border-radius:12px;padding:24px;transition:border 0.2s}

.card-title{font-size:13px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:16px}
.grad-blue{background:linear-gradient(135deg,rgba(30,58,138,0.4),#1e293b);border:1px solid rgba(30,64,175,0.3);border-radius:12px;padding:20px}
.grad-green{background:linear-gradient(135deg,rgba(6,78,59,0.4),#1e293b);border:1px solid rgba(5,150,105,0.3);border-radius:12px;padding:20px}
.grad-purple{background:linear-gradient(135deg,rgba(76,29,149,0.4),#1e293b);border:1px solid rgba(109,40,217,0.3);border-radius:12px;padding:20px}
.grad-cyan{background:linear-gradient(135deg,rgba(14,116,144,0.4),#1e293b);border:1px solid rgba(8,145,178,0.3);border-radius:12px;padding:20px}
.cm-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.cm-value{font-size:24px;font-weight:700;color:white;margin-top:8px}

table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;background:rgba(15,23,42,0.6);cursor:pointer;user-select:none;white-space:nowrap}

.st{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;display:inline-block}
.st-c{background:rgba(16,185,129,0.2);color:#34d399;border:1px solid rgba(16,185,129,0.3)}
.st-r{background:rgba(245,158,11,0.2);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.st-x{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.st-s{background:rgba(249,115,22,0.2);color:#fb923c;border:1px solid rgba(249,115,22,0.3)}

.filter-title{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:0.05em}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
select,input[type="text"]{background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;width:100%}

.center-stats div{text-align:center}
.center-stats .num{font-size:18px;font-weight:700}
.center-stats .lbl{font-size:12px;color:#64748b}
.chart-wrap{position:relative;width:100%;height:280px}
.chart-wrap.tall{height:350px}
.sort-arrow{font-size:10px;margin-left:2px}
.hidden{display:none}
.text-right{text-align:right}
.text-center{text-align:center}
.text-blue{color:#60a5fa}
.text-green{color:#34d399}
.text-red{color:#f87171}
.text-purple{color:#a78bfa}
.text-amber{color:#fbbf24}
.fw600{font-weight:600}
.fw700{font-weight:700}
.fs12{font-size:12px}
/* Loading overlay */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,15,26,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:48px;height:48px;border:4px solid #1e293b;border-top:4px solid #2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
.loading-text{font-size:16px;color:#94a3b8;margin-bottom:8px}
.loading-sub{font-size:13px;color:#475569}
.error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:12px;padding:24px;max-width:500px;text-align:center;margin-top:16px}
.error-box h3{color:#f87171;margin-bottom:8px}
.error-box p{color:#94a3b8;font-size:14px;line-height:1.5}
.margin-bar{height:6px;border-radius:3px;background:#1e293b;overflow:hidden;margin-top:6px}
.margin-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
/* ===== MOBILE RESPONSIVE ===== */

  .header-right{width:100%;flex-wrap:wrap;justify-content:flex-start;gap:8px}
  .gmv-bar{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  .gmv-btn{padding:6px 12px;font-size:12px;white-space:nowrap}

  .gmv-val{font-size:14px}

  .content{padding:12px}
  .grid-2{grid-template-columns:1fr}
  .grid-8{grid-template-columns:repeat(2,1fr);gap:8px}
  .grid-6{grid-template-columns:repeat(2,1fr);gap:8px}

  .kpi-label{font-size:10px}
  .kpi-value{font-size:16px}

  .card-title{font-size:12px;margin-bottom:12px}
  .chart-wrap{height:220px}
  .chart-wrap.tall{height:280px}
  .cm-value{font-size:18px}
  .cm-label{font-size:10px}

  .search-wrap{grid-column:span 1 !important}

}

</style>

<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Connecting to SharePoint...</div>
  <div class="loading-sub" id="loadingSub">Authenticating with Microsoft SSO</div>
  <div id="errorContainer"></div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <h1>GREVORO</h1>
        <p class="subtitle">Customer Orders & Performance Dashboard</p>
      </div>
      <div class="header-right">
        <div class="gmv-bar" id="gmvBar"></div>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshData()" title="Refresh data from SharePoint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          Refresh
        </button>
        <div class="auth-area" id="authArea">
          <button class="auth-btn login" id="loginBtn" onclick="doLogin()">Sign In</button>
        </div>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      <span class="status-dot yellow"></span>
      <span>Not connected</span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="content">
  <div class="toggles" id="toggles"></div>
  <div id="tabContent"></div>
</div>

<script>
// ===== CONFIGURATION =====
const AZURE_CONFIG = {
  clientId: "8decfe4f-1038-41e6-9d82-af8641e5f660",
  authority: "https://login.microsoftonline.com/330ea988-3e86-48ff-ab6d-53e5aeb9c429",
  redirectUri: window.location.origin + window.location.pathname,
  scopes: ["Files.Read.All", "Sites.Read.All", "User.Read"]
};

const SHARE_LINK = "https://grevoro-my.sharepoint.com/:x:/p/ralph_j/IQAUcjQzmAeHRLlxRCqkQdUnAfqbW2L9i6g_HrbCYcRZV0I";

// ===== MSAL SETUP =====
const msalConfig = {
  auth: {
    clientId: AZURE_CONFIG.clientId,
    authority: AZURE_CONFIG.authority,
    redirectUri: AZURE_CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
};
let msalInstance = null;
let currentAccount = null;

// ===== DATA (populated from SharePoint) =====
let ORDERS = [];
let SUPPLIERS_BUY = [];
let DUMP = { totalBuy: 0, totalSell: 0, grossSpread: 0, spreadPct: 0, totalCollected: 0, collectionPct: 0, avgPayCycle: 0, avgReceiptCycle: 0 };
let LC_TRACKER = [];
let CREDIT_TRACKER = [];

const COLORS = { Completed: "#10b981", Running: "#f59e0b", Cancelled: "#ef4444", "Short Closed": "#f97316" };
const PAL = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#84cc16","#14b8a6"];

// ===== STATE =====
let state = { tab: "overview", gmvView: "all", showCancelled: true, showQty: false, sortKey: "slNo", sortDir: "asc", filterCust: "All", filterStatus: "All", filterProd: "All", searchPO: "", lcSortKey: "client", lcSortDir: "asc", lcFilterClient: "All", lcFilterStatus: "All" };
let charts = {};
let lastRefresh = null;

// ===== INIT =====
async function init() {
  try {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();

    // Handle redirect response
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) currentAccount = resp.account;

    // Check existing accounts
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      currentAccount = accounts[0];
    }

    if (currentAccount) {
      updateAuthUI(true);
      await refreshData();
    } else {
      // No account found, show login button
      hideLoading();
      updateAuthUI(false);
      updateStatus("yellow", "Sign in to load live data");
    }
  } catch (err) {
    console.error("MSAL init error:", err);
    hideLoading();
    showError("Authentication Setup Failed", "Could not initialize Microsoft authentication. Check that the Azure AD app is configured correctly.<br><br><code>" + err.message + "</code>");
  }
}

async function doLogin() {
  try {
    showLoading("Signing in...", "Redirecting to Microsoft login");
    await msalInstance.loginRedirect({ scopes: AZURE_CONFIG.scopes });
  } catch (err) {
    hideLoading();
    if (err.errorCode !== "user_cancelled") {
      showError("Sign In Failed", err.message);
    }
  }
}

async function doLogout() {
  try {
    await msalInstance.logoutRedirect();
  } catch (err) { console.error(err); }
}

async function getToken() {
  const request = { scopes: AZURE_CONFIG.scopes, account: currentAccount };
  try {
    const resp = await msalInstance.acquireTokenSilent(request);
    return resp.accessToken;
  } catch (e) {
    // If silent fails, redirect to login again
    await msalInstance.acquireTokenRedirect(request);
    return null;
  }
}

// ===== GRAPH API =====
async function graphGet(url, token) {
  const resp = await fetch(url, { headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" } });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error("Graph API " + resp.status + ": " + errText);
  }
  return resp.json();
}

async function resolveShareLink(token) {
  const encoded = btoa(SHARE_LINK).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const shareId = "u!" + encoded;
  const data = await graphGet("https://graph.microsoft.com/v1.0/shares/" + shareId + "/driveItem", token);
  return { driveId: data.parentReference.driveId, itemId: data.id, fileName: data.name };
}

async function readWorksheet(token, driveId, itemId, sheetName) {
  const url = "https://graph.microsoft.com/v1.0/drives/" + driveId + "/items/" + itemId + "/workbook/worksheets('" + encodeURIComponent(sheetName) + "')/usedRange";
  return graphGet(url, token);
}

// ===== EXCEL PARSER (ported from update_dashboard.py) =====
function findCol(keywords, headers) {
  for (let i = 0; i < headers.length; i++) {
    const hl = (headers[i] || "").toLowerCase();
    if (keywords.every(k => hl.includes(k))) return i;
  }
  return null;
}

function safeNum(row, idx) {
  if (idx == null || idx >= row.length) return 0;
  const v = row[idx];
  if (v == null || v === "") return 0;
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function safeStr(row, idx) {
  if (idx == null || idx >= row.length) return "";
  const v = row[idx];
  return v != null ? String(v).trim() : "";
}

function safeDate(row, idx) {
  if (idx == null || idx >= row.length) return "";
  const v = row[idx];
  if (v == null || v === "") return "";
  // If it's a number (Excel serial date)
  if (typeof v === "number") {
    const d = new Date((v - 25569) * 86400 * 1000);
    return d.getDate() + "." + (d.getMonth() + 1) + "." + d.getFullYear();
  }
  return String(v).trim();
}

function parseOrdersSheet(rangeData) {
  const rows = rangeData.values || [];
  if (rows.length === 0) return [];

  // Find header row
  let hdrIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const vals = rows[i].map(v => (v != null ? String(v).trim().toLowerCase() : ""));
    if (vals.some(v => v.includes("sl") && v.includes("no")) || vals.some(v => v === "customer")) {
      hdrIdx = i;
      break;
    }
  }

  const headers = rows[hdrIdx].map((v, j) => v != null ? String(v).trim() : "col" + j);
  const colMap = {
    slNo: findCol(["sl"], headers),
    customer: findCol(["customer"], headers),
    orderStatus: findCol(["order", "status"], headers) || findCol(["status"], headers),
    poNumber: findCol(["po", "number"], headers),
    poDate: findCol(["po", "date"], headers),
    billTo: findCol(["bill", "to"], headers),
    qty: findCol(["qty"], headers),
    value: findCol(["value"], headers),
    billed: findCol(["billed"], headers),
    unexecuted: findCol(["unexecuted"], headers) || findCol(["un-executed"], headers),
    paymentTerms: findCol(["customer", "payment"], headers) || findCol(["payment", "terms"], headers),
    shipToCity: findCol(["ship", "to", "city"], headers) || findCol(["ship to city"], headers),
    supplier: findCol(["supplier"], headers),
    product: findCol(["product"], headers),
    lcReceived: findCol(["lc", "received"], headers) || findCol(["lc"], headers),
    remarks: findCol(["remark"], headers),
  };

  // Payment type column B (index 1)
  const payTypeCol = 1;
  const cm1Col = findCol(["cm1"], headers) || findCol(["plan", "cm1"], headers);
  const cm2Col = findCol(["cm2"], headers) || findCol(["plan", "cm2"], headers);

  const orders = [];
  for (let i = hdrIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row.length) continue;

    const slVal = colMap.slNo != null ? row[colMap.slNo] : null;
    const custVal = colMap.customer != null ? row[colMap.customer] : null;
    if (!slVal && !custVal) continue;

    let cm1 = null, cm2 = null;
    if (cm1Col != null && row[cm1Col] != null && row[cm1Col] !== "") {
      const n = parseFloat(row[cm1Col]);
      if (!isNaN(n)) cm1 = n;
    }
    if (cm2Col != null && row[cm2Col] != null && row[cm2Col] !== "") {
      const n = parseFloat(row[cm2Col]);
      if (!isNaN(n)) cm2 = n;
    }

    const customer = safeStr(row, colMap.customer);
    if (!customer) continue;

    orders.push({
      slNo: safeNum(row, colMap.slNo) || (i - hdrIdx),
      customer: customer,
      orderStatus: safeStr(row, colMap.orderStatus),
      poNumber: safeStr(row, colMap.poNumber),
      poDate: safeDate(row, colMap.poDate),
      billTo: safeStr(row, colMap.billTo),
      qty: safeNum(row, colMap.qty),
      value: safeNum(row, colMap.value),
      billed: safeNum(row, colMap.billed),
      unexecuted: safeNum(row, colMap.unexecuted),
      paymentTerms: safeStr(row, colMap.paymentTerms),
      shipToCity: safeStr(row, colMap.shipToCity),
      supplier: safeStr(row, colMap.supplier),
      product: safeStr(row, colMap.product),
      lcReceived: safeStr(row, colMap.lcReceived),
      remarks: safeStr(row, colMap.remarks),
      paymentType: safeStr(row, payTypeCol),
      cm1Pct: cm1,
      cm2Pct: cm2
    });
  }
  return orders;
}

function parseLCTrackerSheet(rangeData) {
  const rows = rangeData.values || [];
  if (rows.length === 0) return [];
  // Header is at row index 3 (4th row)
  let hIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 8); i++) {
    const vals = rows[i].map(v => v != null ? String(v).trim().toLowerCase() : "");
    if (vals.some(v => v.includes("lc issue month")) || vals.some(v => v.includes("client name"))) {
      hIdx = i; break;
    }
  }
  const headers = rows[hIdx].map((v, j) => v != null ? String(v).trim() : "col" + j);
  const fi = (names) => { for (const n of names) { const idx = headers.findIndex(h => h.toLowerCase().includes(n.toLowerCase())); if (idx >= 0) return idx; } return -1; };
  const cols = {
    month:    fi(["lc issue month"]),
    client:   fi(["client name"]),
    status:   fi(["lc status"]),
    po:       fi(["po"]),
    lcNo:     fi(["lc no"]),
    issueDate:fi(["lc issue date"]),
    expiry:   fi(["lc expiry"]),
    lastShip: fi(["last shipment"]),
    poVal:    fi(["po value"]),
    lcVal:    fi(["lc value"]),
    invRaised:fi(["invoices raised"]),
    lcRemain: fi(["remaining balance"]),
    boeAcc:   fi(["boes accepted"]),
    lcStatus2:fi(["lc status"]),
    usance:   fi(["usance"]),
    greBank:  fi(["grevoro bank"]),
    custBank: fi(["customer bank"]),
    lcDisc:   fi(["discounted in %"]),
    lcUtil:   fi(["utilization in %"])
  };
  // Find second occurrence of "LC Status" for the sub-status column
  const lcStatusIndices = headers.reduce((acc, h, i) => { if (h.toLowerCase().includes("lc status")) acc.push(i); return acc; }, []);
  if (lcStatusIndices.length >= 2) cols.lcStatus2 = lcStatusIndices[1];
  const safeN = (row, c) => { if (c < 0 || c >= row.length) return 0; const v = row[c]; return typeof v === "number" ? v : parseFloat(String(v).replace(/,/g,"")) || 0; };
  const safeS = (row, c) => { if (c < 0 || c >= row.length) return ""; const v = row[c]; return v != null ? String(v).trim() : ""; };
  const result = [];
  for (let i = hIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const client = safeS(row, cols.client);
    if (!client || client.toLowerCase().includes("total") || client.toLowerCase().includes("lc no")) continue;
    const lcVal = safeN(row, cols.lcVal);
    if (lcVal === 0 && !client) continue;
    result.push({
      month:     safeS(row, cols.month),
      client:    client,
      lcActive:  safeS(row, cols.status),
      po:        safeS(row, cols.po),
      lcNo:      safeS(row, cols.lcNo),
      issueDate: safeS(row, cols.issueDate),
      expiry:    safeS(row, cols.expiry),
      lastShip:  safeS(row, cols.lastShip),
      poVal:     safeN(row, cols.poVal),
      lcVal:     lcVal,
      invRaised: safeN(row, cols.invRaised),
      lcRemain:  safeN(row, cols.lcRemain),
      boeAcc:    safeN(row, cols.boeAcc),
      lcStatus:  safeS(row, cols.lcStatus2),
      usance:    safeS(row, cols.usance),
      greBank:   safeS(row, cols.greBank),
      custBank:  safeS(row, cols.custBank),
      lcDisc:    safeN(row, cols.lcDisc),
      lcUtil:    safeN(row, cols.lcUtil)
    });
  }
  return result;
}

function parseCreditTrackerSheet(rangeData) {
  const rows = rangeData.values || [];
  if (rows.length === 0) return [];
  // Header at row 0
  const headers = rows[0].map((v,j) => v != null ? String(v).trim() : "col"+j);
  const fi = (s) => headers.findIndex(h => h.toLowerCase().includes(s.toLowerCase()));
  const custCol = fi("customer"); const ocLimitCol = fi("open credit"); const lcLimitCol = fi("pre shipment");
  // Find second occurrences for billed values
  const ocIdxAll = headers.reduce((a,h,i)=>{ if(h.toLowerCase().includes("open credit")) a.push(i); return a;},[]);
  const lcIdxAll = headers.reduce((a,h,i)=>{ if(h.toLowerCase().includes("pre shipment")) a.push(i); return a;},[]);
  const ocBilledCol = ocIdxAll.length >= 2 ? ocIdxAll[1] : -1;
  const lcBilledCol = lcIdxAll.length >= 2 ? lcIdxAll[1] : -1;
  const totalBilledCol = fi("total billed"); const availCol = fi("available");
  const safeN = (row,c) => { if(c<0||c>=row.length) return 0; const v=row[c]; return typeof v==="number"?v:parseFloat(String(v).replace(/,/g,""))||0; };
  const safeS = (row,c) => { if(c<0||c>=row.length) return ""; const v=row[c]; return v!=null?String(v).trim():""; };
  const result = [];
  for (let i=1;i<rows.length;i++) {
    const row=rows[i]; const cust=safeS(row,custCol);
    if(!cust||cust.toLowerCase().includes("total")) continue;
    result.push({ customer:cust, ocLimit:safeN(row,ocLimitCol), lcLimit:safeN(row,lcLimitCol), ocBilled:safeN(row,ocBilledCol), lcBilled:safeN(row,lcBilledCol), totalBilled:safeN(row,totalBilledCol), available:safeN(row,availCol) });
  }
  return result;
}

function parseDumpSheet(rangeData) {
  const rows = rangeData.values || [];
  if (rows.length === 0) return { dump: DUMP, suppliers: [] };

  // Find header row
  let dhIdx = 0;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const vals = rows[i].map(v => (v != null ? String(v).trim().toLowerCase() : ""));
    if (vals.some(v => v.includes("supplier")) || vals.some(v => v.includes("buyer"))) {
      dhIdx = i;
      break;
    }
  }

  const dHeaders = rows[dhIdx].map((v, j) => v != null ? String(v).trim().toLowerCase() : "col" + j);

  const buyCol = dHeaders.findIndex(h => h.includes("bill") && h.includes("gst"));
  const sellCol = dHeaders.findIndex(h => h.includes("invoice") && h.includes("gst"));
  const collCol = dHeaders.findIndex(h => h.includes("amount") && h.includes("rec"));
  const suppCol = dHeaders.findIndex(h => h.includes("supplier"));
  const payDateCol = dHeaders.findIndex(h => h.includes("date") && h.includes("payment"));
  const purchDateCol = dHeaders.findIndex(h => h.includes("date") && h.includes("purchase"));
  const saleDateCol = dHeaders.findIndex(h => h.includes("date") && h.includes("sale"));
  const recDateCol = dHeaders.findIndex(h => h.includes("date") && h.includes("receipt"));
  const boeDaysCol = dHeaders.findIndex(h => h.includes("outstanding") && h.includes("day"));

  let totalBuy = 0, totalSell = 0, totalColl = 0;
  const payDays = [], recDays = [];
  const suppBuy = {};

  for (let i = dhIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row.some(v => v != null && v !== "")) continue;

    const bv = buyCol >= 0 ? safeNum(row, buyCol) : 0;
    const sv = sellCol >= 0 ? safeNum(row, sellCol) : 0;
    const cv = collCol >= 0 ? safeNum(row, collCol) : 0;
    totalBuy += bv;
    totalSell += sv;
    totalColl += cv;

    if (suppCol >= 0 && row[suppCol]) {
      const sname = String(row[suppCol]).trim().substring(0, 20);
      suppBuy[sname] = (suppBuy[sname] || 0) + bv;
    }

    // Payment cycle
    if (payDateCol >= 0 && purchDateCol >= 0 && row[payDateCol] && row[purchDateCol]) {
      try {
        const pd1 = typeof row[purchDateCol] === "number" ? new Date((row[purchDateCol] - 25569) * 86400000) : new Date(row[purchDateCol]);
        const pd2 = typeof row[payDateCol] === "number" ? new Date((row[payDateCol] - 25569) * 86400000) : new Date(row[payDateCol]);
        const diff = Math.round((pd2 - pd1) / 86400000);
        if (diff > 0 && diff < 365) payDays.push(diff);
      } catch (e) {}
    }
    // Receipt cycle
    if (recDateCol >= 0 && saleDateCol >= 0 && row[recDateCol] && row[saleDateCol]) {
      try {
        const sd = typeof row[saleDateCol] === "number" ? new Date((row[saleDateCol] - 25569) * 86400000) : new Date(row[saleDateCol]);
        const rd = typeof row[recDateCol] === "number" ? new Date((row[recDateCol] - 25569) * 86400000) : new Date(row[recDateCol]);
        const diff = Math.round((rd - sd) / 86400000);
        if (diff > 0 && diff < 365) recDays.push(diff);
      } catch (e) {}
    }
    // BOE outstanding days
    if (boeDaysCol >= 0 && row[boeDaysCol]) {
      const bd = parseFloat(row[boeDaysCol]);
      if (!isNaN(bd) && bd > 0 && bd < 365) recDays.push(bd);
    }
  }

  const spread = totalSell - totalBuy;
  const dump = {
    totalBuy: Math.round(totalBuy * 100) / 100,
    totalSell: Math.round(totalSell * 100) / 100,
    grossSpread: Math.round(spread * 100) / 100,
    spreadPct: totalBuy > 0 ? Math.round(spread / totalBuy * 1000) / 10 : 0,
    totalCollected: Math.round(totalColl * 100) / 100,
    collectionPct: totalSell > 0 ? Math.round(totalColl / totalSell * 1000) / 10 : 0,
    avgPayCycle: payDays.length > 0 ? Math.round(payDays.reduce((a, b) => a + b, 0) / payDays.length) : 7,
    avgReceiptCycle: recDays.length > 0 ? Math.round(recDays.reduce((a, b) => a + b, 0) / recDays.length) : 32
  };

  const suppArr = Object.entries(suppBuy)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([name, value]) => ({ name, value: Math.round(value) }));

  return { dump, suppliers: suppArr };
}

// ===== DATA REFRESH =====
async function refreshData() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  showLoading("Loading data from SharePoint...", "Fetching Excel workbook");

  try {
    const token = await getToken();

    updateLoadingState("Resolving SharePoint link...", "");
    const fileInfo = await resolveShareLink(token);

    updateLoadingState("Reading Orders sheet...", fileInfo.fileName);
    const ordersRange = await readWorksheet(token, fileInfo.driveId, fileInfo.itemId, "Orders");
    ORDERS = parseOrdersSheet(ordersRange);

    updateLoadingState("Reading Dump sheet...", ORDERS.length + " orders loaded");
    try {
      const dumpRange = await readWorksheet(token, fileInfo.driveId, fileInfo.itemId, "Dump");
      const dumpResult = parseDumpSheet(dumpRange);
      DUMP = dumpResult.dump;
      SUPPLIERS_BUY = dumpResult.suppliers;
    } catch (e) {
      console.warn("Dump sheet not found or error:", e.message);
    }

    updateLoadingState("Reading LC Tracker sheet...", "");
    try {
      const lcRange = await readWorksheet(token, fileInfo.driveId, fileInfo.itemId, "LC tracker");
      LC_TRACKER = parseLCTrackerSheet(lcRange);
      console.log("LC Tracker loaded:", LC_TRACKER.length, "records");
    } catch (e) {
      console.warn("LC tracker sheet not found or error:", e.message);
    }

    updateLoadingState("Reading Credit Tracker sheet...", "");
    try {
      const crRange = await readWorksheet(token, fileInfo.driveId, fileInfo.itemId, "Credit Tracker");
      CREDIT_TRACKER = parseCreditTrackerSheet(crRange);
      console.log("Credit Tracker loaded:", CREDIT_TRACKER.length, "records");
    } catch (e) {
      console.warn("Credit tracker sheet not found or error:", e.message);
    }

    lastRefresh = new Date();
    updateStatus("green", "Live — " + ORDERS.length + " orders | Last refresh: " + lastRefresh.toLocaleTimeString());
    hideLoading();
    render();

  } catch (err) {
    console.error("Data refresh error:", err);
    hideLoading();
    if (ORDERS.length > 0) {
      // Have cached data, show warning
      updateStatus("yellow", "Refresh failed — showing cached data. " + err.message);
      render();
    } else {
      showError("Failed to Load Data", "Could not read the Excel file from SharePoint.<br><br><code>" + err.message + "</code><br><br>Check that you have access to the file and try again.");
    }
  } finally {
    btn.classList.remove("spinning");
  }
}

// ===== UTILS =====
const fmt = n => { if (n == null) return "-"; const a = Math.abs(n); if (a >= 1e7) return "\u20B9" + (n / 1e7).toFixed(2) + " Cr"; if (a >= 1e5) return "\u20B9" + (n / 1e5).toFixed(2) + " L"; if (a >= 1e3) return "\u20B9" + (n / 1e3).toFixed(1) + "K"; return "\u20B9" + n.toFixed(0); };
const fmtF = n => { if (n == null) return "-"; return "\u20B9" + Math.round(n).toLocaleString("en-IN"); };
const stCls = s => ({ "Completed": "st st-c", "Running": "st st-r", "Cancelled": "st st-x", "Short Closed": "st st-s" }[s] || "st st-r");

function getActive() { return state.showCancelled ? ORDERS : ORDERS.filter(o => o.orderStatus !== "Cancelled"); }

function calc() {
  const a = getActive();
  const gmvT = a.reduce((s, o) => s + o.value, 0);
  const gmvB = a.reduce((s, o) => s + o.billed, 0);
  const gmvU = a.reduce((s, o) => s + o.unexecuted, 0);
  const tQty = a.reduce((s, o) => s + o.qty, 0);
  const exPct = gmvT > 0 ? (gmvB / gmvT * 100).toFixed(1) : 0;
  let c1 = 0, c2 = 0, bw = 0, cn = 0;
  a.forEach(o => { if (o.cm1Pct != null) { c1 += o.billed * o.cm1Pct / 100; c2 += o.billed * (o.cm2Pct || 0) / 100; bw += o.billed; cn++; } });
  const stC = {}; a.forEach(o => { stC[o.orderStatus] = (stC[o.orderStatus] || 0) + 1; });
  const custM = {}; a.forEach(o => { if (!custM[o.customer]) custM[o.customer] = { name: o.customer, value: 0, billed: 0, unexecuted: 0, qty: 0, count: 0, cm1Val: 0, cm2Val: 0, cmBilled: 0 }; custM[o.customer].value += o.value; custM[o.customer].billed += o.billed; custM[o.customer].unexecuted += o.unexecuted; custM[o.customer].qty += o.qty; custM[o.customer].count++; if (o.cm1Pct != null) { custM[o.customer].cm1Val += o.billed * o.cm1Pct / 100; custM[o.customer].cm2Val += o.billed * (o.cm2Pct || 0) / 100; custM[o.customer].cmBilled += o.billed; } });
  const custArr = Object.values(custM).sort((a, b) => b.value - a.value);
  const prodM = {}; a.forEach(o => { const p = (o.product || "Other").toLowerCase() === "structurals" ? "Structurals" : (o.product || "Other"); if (!prodM[p]) prodM[p] = { name: p, value: 0 }; prodM[p].value += state.showQty ? o.qty : o.value; });
  const prodArr = Object.values(prodM).sort((a, b) => b.value - a.value);
  const stateM = {}; a.forEach(o => { const s = o.billTo || "Other"; if (!stateM[s]) stateM[s] = { state: s, value: 0, qty: 0 }; stateM[s].value += o.value; stateM[s].qty += o.qty; });
  const stateArr = Object.values(stateM).sort((a, b) => b.value - a.value).slice(0, 10);
  const delivM = {}; a.forEach(o => { const loc = o.shipToCity || o.billTo || "Other"; const st = o.billTo || "Other"; if (!delivM[st]) delivM[st] = { state: st, locations: [], value: 0, qty: 0 }; delivM[st].value += o.value; delivM[st].qty += o.qty; if (loc && !delivM[st].locations.includes(loc)) delivM[st].locations.push(loc); });
  const delivArr = Object.values(delivM).sort((a, b) => b.value - a.value);
  const payM = {}; a.forEach(o => { const t = o.paymentType || "Unassigned"; if (!payM[t]) payM[t] = { name: t, value: 0 }; payM[t].value += o.value; });
  const payArr = Object.values(payM).sort((a, b) => b.value - a.value);
  // LC Status from tracker — only use rows with valid (non-numeric) lcActive, map sub-status or "Active"
  let lcArr;
  if (LC_TRACKER.length > 0) {
    const lcM2 = {};
    LC_TRACKER.forEach(r => {
      const active = String(r.lcActive||"").trim();
      if (!active || !isNaN(Number(active))) return; // skip blank/numeric junk rows
      const s = r.lcStatus && r.lcStatus.trim() ? r.lcStatus.trim() : "Active";
      if (!lcM2[s]) lcM2[s] = 0; lcM2[s]++;
    });
    lcArr = Object.entries(lcM2).filter(([,v])=>v>0).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  } else {
    const lcM = {"LC Received":0,"LC Pending":0,"Open Credit / Immediate":0,"Not Specified":0};
    a.forEach(o => { const l = (o.lcReceived||"").trim(); if(l==="Yes"||l.toLowerCase()==="lc received") lcM["LC Received"]++; else if(l.toLowerCase().includes("pending")) lcM["LC Pending"]++; else if(l==="Invoice mart"||l==="Open Credit"||l==="IMMEDIATE") lcM["Open Credit / Immediate"]++; else lcM["Not Specified"]++; });
    lcArr = Object.entries(lcM).filter(([,v])=>v>0).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  }
  // LC vs Credit split for Payment Type chart
  const lcTotalVal = LC_TRACKER.filter(r => !isNaN(r.lcVal) && r.lcVal > 0).reduce((s,r)=>s+r.lcVal,0);
  const crOCBilled = CREDIT_TRACKER.reduce((s,r)=>s+r.ocBilled,0) * 1e7; // convert Cr to ₹
  const crLCBilled = CREDIT_TRACKER.reduce((s,r)=>s+r.lcBilled,0) * 1e7;
  const payTypeArr = LC_TRACKER.length > 0 || CREDIT_TRACKER.length > 0
    ? [ {name:"LC",value:lcTotalVal}, {name:"Open Credit",value:crOCBilled}, {name:"Pre-Shipment Credit",value:crLCBilled} ].filter(p=>p.value>0)
    : Object.values({}).concat(Object.values((()=>{const m={}; a.forEach(o=>{const t=o.paymentType||"Unassigned";if(!m[t])m[t]={name:t,value:0};m[t].value+=o.value;}); return m;})())).sort((a,b)=>b.value-a.value);
  const ptM = {}; a.forEach(o => { let t = o.paymentTerms || "Unknown"; t = t.replace(/\s+/g, " ").trim(); if (t.length > 30) t = t.substring(0, 30) + "..."; if (!ptM[t]) ptM[t] = { name: t, value: 0, count: 0 }; ptM[t].value += o.value; ptM[t].count++; });
  const ptArr = Object.values(ptM).sort((a, b) => b.value - a.value);

  // Supplier margins from Dump data
  const suppMargins = SUPPLIERS_BUY.map(s => ({
    name: s.name,
    buyValue: s.value,
    marginPct: DUMP.spreadPct,
    marginVal: Math.round(s.value * DUMP.spreadPct / 100)
  }));

  // Customer margins (from CM1/CM2 data)
  const custMargins = custArr.map(c => ({
    name: c.name,
    billed: c.billed,
    value: c.value,
    cm1Pct: c.cmBilled > 0 ? (c.cm1Val / c.cmBilled * 100) : null,
    cm2Pct: c.cmBilled > 0 ? (c.cm2Val / c.cmBilled * 100) : null,
    cm1Val: c.cm1Val,
    cm2Val: c.cm2Val,
    cmBilled: c.cmBilled
  })).sort((a, b) => (b.cm1Val || 0) - (a.cm1Val || 0));

  return { a, gmvT, gmvB, gmvU, tQty, exPct, c1, c2, bw, cn, c1p: bw > 0 ? (c1 / bw * 100).toFixed(2) : 0, c2p: bw > 0 ? (c2 / bw * 100).toFixed(2) : 0, stC, custArr, prodArr, stateArr, delivArr, payArr, lcArr, ptArr, suppMargins, custMargins, payTypeArr };
}

// ===== RENDER =====
function render() {
  if (ORDERS.length === 0) {
    document.getElementById("gmvBar").innerHTML = "";
    document.getElementById("tabs").innerHTML = "";
    document.getElementById("toggles").innerHTML = "";
    document.getElementById("tabContent").innerHTML = '<div style="text-align:center;padding:80px 20px;color:#64748b"><p style="font-size:18px;margin-bottom:8px">No data loaded</p><p>Sign in and connect to SharePoint to view the dashboard</p></div>';
    return;
  }

          <th onclick="sortBy(\'customer\')">Customer ' + sa("customer") + '</th>\
          <th onclick="sortBy(\'poNumber\')">PO Number ' + sa("poNumber") + '</th>\
          <th onclick="sortBy(\'orderStatus\')">Status ' + sa("orderStatus") + '</th>\
          <th onclick="sortBy(\'poDate\')">Date</th>\
          <th>Ship To</th>\
          <th class="text-right" onclick="sortBy(\'qty\')">Qty ' + sa("qty") + '</th>\
          <th class="text-right" onclick="sortBy(\'value\')">PO Value ' + sa("value") + '</th>\
          <th class="text-right" onclick="sortBy(\'billed\')">Billed ' + sa("billed") + '</th>\
          <th class="text-right">Unexecuted</th>\
          <th class="text-right">Exec %</th>\
          <th>Product</th>\
          <th class="text-center">CM1%</th>\
          <th class="text-center">CM2%</th>\
        </tr></thead>\
        <tbody>' + rows.map(function(o) { var ep = o.value > 0 ? (o.billed / o.value * 100).toFixed(1) : "0.0"; var epc = parseFloat(ep) >= 80 ? "#34d399" : parseFloat(ep) >= 50 ? "#fbbf24" : "#f87171"; return '<tr>\
          <td style="color:#64748b">' + o.slNo + '</td>\
          <td class="fw600">' + o.customer + '</td>\
          <td class="text-blue fw600 fs12">' + o.poNumber + '</td>\
          <td><span class="' + stCls(o.orderStatus) + '">' + o.orderStatus + '</span></td>\
          <td style="color:#64748b" class="fs12">' + o.poDate + '</td>\
          <td class="fs12">' + o.shipToCity + '</td>\
          <td class="text-right">' + o.qty + '</td>\
          <td class="text-right fw600">' + fmtF(o.value) + '</td>\
          <td class="text-right text-green fw600">' + fmtF(o.billed) + '</td>\
          <td class="text-right text-red fw600">' + fmtF(o.unexecuted) + '</td>\
          <td class="text-right"><span class="fw700" style="color:' + epc + '">' + ep + '%</span></td>\
          <td class="fs12">' + (o.product || "-") + '</td>\
          <td class="text-center text-blue fw700">' + (o.cm1Pct != null ? o.cm1Pct + "%" : "-") + '</td>\
          <td class="text-center text-green fw700">' + (o.cm2Pct != null ? o.cm2Pct + "%" : "-") + '</td>\
        </tr>'; }).join("") + '</tbody>\
      </table></div>\
      <div class="table-footer">\
        <span class="label">Showing ' + rows.length + ' of ' + d.a.length + ' orders</span>\
        <div style="display:flex;gap:16px">\
          <span class="label">Value: <span class="val" style="color:white">' + fmt(totV) + '</span></span>\
          <span class="label">Billed: <span class="val text-green">' + fmt(totB) + '</span></span>\
          <span class="label">Unexecuted: <span class="val text-red">' + fmt(totU) + '</span></span>\
        </div>\
      </div>\
    </div>';
    document.getElementById("fCust").onchange = function(e) { state.filterCust = e.target.value; render(); };
    document.getElementById("fStat").onchange = function(e) { state.filterStatus = e.target.value; render(); };
    document.getElementById("fProd").onchange = function(e) { state.filterProd = e.target.value; render(); };
    document.getElementById("fSearch").oninput = function(e) { state.searchPO = e.target.value; render(); };
  }
}

function sortBy(k) { if (state.sortKey === k) state.sortDir = state.sortDir === "asc" ? "desc" : "asc"; else { state.sortKey = k; state.sortDir = "asc"; } render(); }
function lcSortBy(k) { if (state.lcSortKey === k) state.lcSortDir = state.lcSortDir === "asc" ? "desc" : "asc"; else { state.lcSortKey = k; state.lcSortDir = "asc"; } render(); }

function renderLCTracker(d) {
  var tc = document.getElementById("tabContent");
  // Only valid rows (no numeric junk)
  var lc = LC_TRACKER.filter(function(r){ var a=String(r.lcActive||"").trim(); return a && isNaN(Number(a)); });

  // Filter options (built from full dataset)
  var totalAllLCs = lc.length;
  var clients  = ["All"].concat(Array.from(new Set(lc.map(function(r){return r.client;}).filter(Boolean))));
  var statuses = ["All"].concat(Array.from(new Set(lc.map(function(r){ return r.lcStatus&&r.lcStatus.trim()?r.lcStatus.trim():"Active"; }))));

  // Apply filters
  var filtered = lc.filter(function(r){
    if (state.lcFilterClient !== "All" && r.client !== state.lcFilterClient) return false;
    var s = r.lcStatus&&r.lcStatus.trim()?r.lcStatus.trim():"Active";
    if (state.lcFilterStatus !== "All" && s !== state.lcFilterStatus) return false;
    return true;
  });

  // KPI summary — computed from filtered rows
  var totalLCs   = filtered.length;
  var totalLCVal = filtered.reduce(function(s,r){return s+r.lcVal;},0);
  var totalPOVal = filtered.reduce(function(s,r){return s+r.poVal;},0);
  var totalInv   = filtered.reduce(function(s,r){return s+r.invRaised;},0);
  var totalRem   = filtered.reduce(function(s,r){return s+r.lcRemain;},0);
  var totalBOE   = filtered.reduce(function(s,r){return s+r.boeAcc;},0);
  var avgUtil    = totalLCVal > 0 ? (totalInv / totalLCVal * 100).toFixed(1) : 0;

  // Sort
  var sorted = filtered.slice().sort(function(a,b){
    var av=a[state.lcSortKey], bv=b[state.lcSortKey];
    if (typeof av==="number") return state.lcSortDir==="asc"?av-bv:bv-av;
    return state.lcSortDir==="asc"?String(av||"").localeCompare(String(bv||"")):String(bv||"").localeCompare(String(av||""));
  });

  var sa = function(k){ return state.lcSortKey===k?(state.lcSortDir==="asc"?"▲":"▼"):""; };
  var lcColors = {"Active":"#3b82f6","BOE Filing Pending":"#f59e0b","Accepted and Discounted":"#10b981","BOE Lodged Acceptance Pending":"#8b5cf6","Dispatch pending":"#06b6d4","BOEs presented to Bank":"#ec4899"};
  var lcBg     = {"Active":"rgba(59,130,246,0.15)","BOE Filing Pending":"rgba(245,158,11,0.15)","Accepted and Discounted":"rgba(16,185,129,0.15)","BOE Lodged Acceptance Pending":"rgba(139,92,246,0.15)","Dispatch pending":"rgba(6,182,212,0.15)","BOEs presented to Bank":"rgba(236,72,153,0.15)"};

  function fmtDate(v){ if(!v||v==="NaT"||v==="nan"||v==="undefined") return "—"; try{var dt=new Date(v);if(isNaN(dt))return v;return dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}catch(e){return v;} }
  function statusBadge(v){ if(!v||v.trim()==="") v="Active"; var c=lcColors[v]||"#94a3b8",b=lcBg[v]||"rgba(148,163,184,0.15)"; return '<span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:'+b+';color:'+c+';border:1px solid '+c+'40;white-space:nowrap">'+v+'</span>'; }

  var COLS = [
    {key:"month",    label:"Month",       fmt:function(r){return fmtDate(r.month);}},
    {key:"client",   label:"Client",      fmt:function(r){return r.client||"—";}},
    {key:"po",       label:"PO",          fmt:function(r){return r.po||"—";}},
    {key:"lcNo",     label:"LC No.",      fmt:function(r){return r.lcNo||"—";}},
    {key:"expiry",   label:"Expiry",      fmt:function(r){return fmtDate(r.expiry);}},
    {key:"lastShip", label:"Last Ship",   fmt:function(r){return fmtDate(r.lastShip);}},
    {key:"poVal",    label:"PO Value",    fmt:function(r){return r.poVal>0?fmtF(r.poVal):"—";}, align:"right"},
    {key:"lcVal",    label:"LC Value",    fmt:function(r){return r.lcVal>0?fmtF(r.lcVal):"—";}, align:"right"},
    {key:"invRaised",label:"Invoiced",    fmt:function(r){return r.invRaised>0?fmtF(r.invRaised):"—";}, align:"right"},
    {key:"lcRemain", label:"Remaining",   fmt:function(r){return r.lcRemain>0?fmtF(r.lcRemain):"—";}, align:"right"},
    {key:"lcUtil",   label:"Utilization", fmt:function(r){return r.lcUtil>0?r.lcUtil.toFixed(1)+"%":"—";}, align:"right"},
    {key:"lcStatus", label:"Status",      fmt:function(r){return statusBadge(r.lcStatus);}}
  ];

  var tableRows = sorted.map(function(row){
    return "<tr>"+COLS.map(function(c){ return '<td style="text-align:'+(c.align||"left")+'">'+c.fmt(row)+'</td>'; }).join("")+"</tr>";
  }).join("");

  var noData = lc.length===0?'<div style="text-align:center;padding:60px;color:#64748b"><p style="font-size:16px;margin-bottom:8px">No LC Tracker data loaded</p><p style="font-size:13px">Sign in and refresh to load from SharePoint</p></div>':"";

  var selStyle = 'style="background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:6px 12px;font-size:13px;outline:none"';

  tc.innerHTML =
    // KPI Row
    '<div class="grid grid-8" style="margin-bottom:20px">' +
      '<div class="kpi"><div class="kpi-label">Total LCs</div><div class="kpi-value">'+totalLCs+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">PO Value</div><div class="kpi-value" style="font-size:16px">'+fmtF(totalPOVal)+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">LC Value</div><div class="kpi-value" style="font-size:16px">'+fmtF(totalLCVal)+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">Invoiced</div><div class="kpi-value" style="font-size:16px;color:#10b981">'+fmtF(totalInv)+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">Remaining</div><div class="kpi-value" style="font-size:16px;color:#f59e0b">'+fmtF(totalRem)+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">BOE Accepted</div><div class="kpi-value" style="font-size:16px;color:#8b5cf6">'+fmtF(totalBOE)+'</div></div>' +
      '<div class="kpi"><div class="kpi-label">Utilization</div><div class="kpi-value" style="color:'+(parseFloat(avgUtil)>=80?"#10b981":parseFloat(avgUtil)>=50?"#f59e0b":"#ef4444")+'">'+avgUtil+'%</div></div>' +
    '</div>' +

    // Pie chart + Filters side by side
    '<div style="display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:20px;align-items:start">' +
      '<div class="card" style="padding:20px">' +
        '<div class="card-title">LC Status</div>' +
        '<div style="height:220px"><canvas id="chLCT"></canvas></div>' +
      '</div>' +
      '<div class="card" style="padding:20px">' +
        '<div class="card-title" style="margin-bottom:14px">Filters</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end">' +
          '<div><div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Client</div>' +
            '<select '+selStyle+' onchange="state.lcFilterClient=this.value;render()">'+
              clients.map(function(c){return '<option value="'+c+'"'+(state.lcFilterClient===c?" selected":"")+'>'+c+'</option>';}).join("")+
            '</select></div>' +
          '<div><div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">LC Status</div>' +
            '<select '+selStyle+' onchange="state.lcFilterStatus=this.value;render()">'+
              statuses.map(function(s){return '<option value="'+s+'"'+(state.lcFilterStatus===s?" selected":"")+'>'+s+'</option>';}).join("")+
            '</select></div>' +
          '<div style="margin-left:auto;font-size:13px;color:#64748b">Showing <strong style="color:#e2e8f0">'+filtered.length+'</strong> of '+totalAllLCs+' LCs</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Table
    (noData || '<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table>' +
      '<thead><tr>'+COLS.map(function(c){return '<th onclick="lcSortBy(\''+c.key+'\')" style="cursor:pointer;text-align:'+(c.align||"left")+'">'+c.label+' '+sa(c.key)+'</th>';}).join("")+'</tr></thead>' +
      '<tbody>'+tableRows+'</tbody>' +
    '</table></div></div>');

  // Pie chart
  setTimeout(function(){
    var lcColors2={"Active":"#3b82f6","BOE Filing Pending":"#f59e0b","Accepted and Discounted":"#10b981","BOE Lodged Acceptance Pending":"#8b5cf6","Dispatch pending":"#06b6d4","BOEs presented to Bank":"#ec4899"};
    var piOpts2={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:"#94a3b8",font:{size:11},padding:10}}}};
    if(charts.chLCT&&charts.chLCT.destroy)charts.chLCT.destroy();
    var el=document.getElementById("chLCT"); if(!el)return;
    charts.chLCT=new Chart(el,{type:"doughnut",data:{labels:d.lcArr.map(function(p){return p.name;}),datasets:[{data:d.lcArr.map(function(p){return p.value;}),backgroundColor:d.lcArr.map(function(p){return lcColors2[p.name]||"#94a3b8";}),borderWidth:0,cutout:"65%"}]},options:Object.assign({},piOpts2,{plugins:Object.assign({},piOpts2.plugins,{tooltip:{callbacks:{label:function(i){var p=d.lcArr[i.dataIndex];return p.name+": "+p.value+" LCs";}}}})})});
  },50);
}

// Chart.js global defaults for dark theme
Chart.defaults.color = "#94a3b8";
Chart.defaults.borderColor = "#1e293b";

// Start
init();
</script>
</body>
</html>
