    // ── COMPONENT ────────────────────────────────────────────────────────────
    function CustomerDashboard(){
      const[activeTab,setActiveTab]=useState("overview");
      const[chartType,setChartType]=useState("value");
      const[showCancelled,setShowCancelled]=useState(true);
      const[filters,setFilters]=useState({customer:"All",status:"All",product:"All"});
      const[searchPO,setSearchPO]=useState("");
      const[sortCfg,setSortCfg]=useState({key:"slNo",dir:"asc"});
      const[expandedRow,setExpandedRow]=useState(null);

      const active=useMemo(()=>showCancelled?ORDERS:ORDERS.filter(o=>o.orderStatus!=="Cancelled"),[showCancelled]);
      const gmvT=useMemo(()=>active.reduce((s,o)=>s+o.value,0),[active]);
      const gmvB=useMemo(()=>active.reduce((s,o)=>s+o.billed,0),[active]);
      const gmvU=useMemo(()=>active.reduce((s,o)=>s+o.unexecuted,0),[active]);
      const tQty=useMemo(()=>active.reduce((s,o)=>s+o.qty,0),[active]);
      const exPct=gmvT>0?(gmvB/gmvT*100).toFixed(1):0;

      const cm=useMemo(()=>{let c1=0,c2=0,bw=0,n=0;active.forEach(o=>{if(o.cm1Pct!=null){c1+=o.billed*o.cm1Pct/100;c2+=o.billed*(o.cm2Pct||0)/100;bw+=o.billed;n++}});return{c1,c2,bw,n,c1p:bw>0?(c1/bw*100).toFixed(2):0,c2p:bw>0?(c2/bw*100).toFixed(2):0}},[active]);

      const stCounts=useMemo(()=>{const c={};active.forEach(o=>{c[o.orderStatus]=(c[o.orderStatus]||0)+1});return c},[active]);
      const custSum=useMemo(()=>{const m={};active.forEach(o=>{if(!m[o.customer])m[o.customer]={name:o.customer,value:0,billed:0,unexecuted:0,qty:0,count:0};m[o.customer].value+=o.value;m[o.customer].billed+=o.billed;m[o.customer].unexecuted+=o.unexecuted;m[o.customer].qty+=o.qty;m[o.customer].count++});return Object.values(m).sort((a,b)=>b.value-a.value)},[active]);
      const prodMix=useMemo(()=>{const m={};active.forEach(o=>{const p=(o.product||"Other").toLowerCase()==="structurals"?"Structurals":(o.product||"Other");if(!m[p])m[p]={name:p,value:0};m[p].value+=chartType==="qty"?o.qty:o.value});return Object.values(m).sort((a,b)=>b.value-a.value)},[active,chartType]);
      const stateSum=useMemo(()=>{const m={};active.forEach(o=>{const s=o.billTo||"Other";if(!m[s])m[s]={state:s,value:0};m[s].value+=o.value});return Object.values(m).sort((a,b)=>b.value-a.value).slice(0,10)},[active]);
      const payTypes=useMemo(()=>{const m={};active.forEach(o=>{const t=o.paymentType||"Unassigned";if(!m[t])m[t]={name:t,value:0};m[t].value+=o.value});return Object.values(m).sort((a,b)=>b.value-a.value)},[active]);
      const lcCounts=useMemo(()=>{const map={"LC Received":0,"LC Pending":0,"Open Credit / Immediate":0,"Not Specified":0};active.forEach(o=>{const l=(o.lcReceived||"").trim();if(l==="Yes"||l.toLowerCase()==="lc received")map["LC Received"]++;else if(l.toLowerCase().includes("pending"))map["LC Pending"]++;else if(l===""||l==="Unknown")map["Not Specified"]++;else map["Open Credit / Immediate"]++});return Object.entries(map).filter(([,v])=>v>0).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value)},[active]);

      const filtered=useMemo(()=>active.filter(o=>{if(filters.customer!=="All"&&o.customer!==filters.customer)return false;if(filters.status!=="All"&&o.orderStatus!==filters.status)return false;if(filters.product!=="All"){const op=(o.product||"").toLowerCase(),fp=filters.product.toLowerCase();if(op!==fp)return false}if(searchPO&&!o.poNumber.toLowerCase().includes(searchPO.toLowerCase()))return false;return true}).sort((a,b)=>{const av=a[sortCfg.key],bv=b[sortCfg.key];if(typeof av==="number")return sortCfg.dir==="asc"?av-bv:bv-av;return sortCfg.dir==="asc"?String(av||"").localeCompare(String(bv||"")):String(bv||"").localeCompare(String(av||""))}),[active,filters,searchPO,sortCfg]);

      const uCust=["All",...new Set(ORDERS.map(o=>o.customer))];
      const uStat=["All",...new Set(ORDERS.map(o=>o.orderStatus))];
      const uProd=["All",...new Set(ORDERS.map(o=>o.product).filter(Boolean).map(p=>p.toLowerCase()==="structurals"?"Structurals":p))];
      const doSort=(k)=>setSortCfg({key:k,dir:sortCfg.key===k&&sortCfg.dir==="asc"?"desc":"asc"});

      const Tab=({id,label,icon:I})=>(<button onClick={()=>setActiveTab(id)} className={`flex items-center gap-2 px-5 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab===id?"bg-blue-600 text-white shadow-lg":"bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white"}`}>{I&&<I size={16}/>}{label}</button>);
      const Toggle=({on,onToggle,label})=>(<button onClick={onToggle} className="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition">{on?<ToggleRight size={20} className="text-blue-400"/>:<ToggleLeft size={20}/>}<span>{label}</span></button>);
      const KPI=({label,value,sub,icon:I})=>(<div className="bg-slate-800 rounded-xl p-4 border border-slate-700 hover:border-slate-600 transition-all group"><div className="flex items-center justify-between mb-2"><span className="text-slate-500 text-xs font-semibold uppercase tracking-wider">{label}</span>{I&&<I size={16} className="text-slate-600 group-hover:text-slate-400 transition"/>}</div><p className="text-white text-xl font-bold">{value}</p>{sub&&<p className="text-slate-500 text-xs mt-1">{sub}</p>}</div>);
      const SH=({label,k,align})=>(<button onClick={()=>doSort(k)} className={`flex items-center gap-1 font-semibold text-slate-400 hover:text-white text-xs uppercase tracking-wider ${align==="right"?"ml-auto":""}`}>{label}{sortCfg.key===k&&(sortCfg.dir==="asc"?<ChevronUp size={12}/>:<ChevronDown size={12}/>)}</button>);

      return(
        <div className="min-h-screen bg-slate-950 text-slate-200">
          <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b border-slate-700 px-6 py-5">
            <div className="max-w-screen-xl mx-auto">
              <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div><h1 className="text-2xl font-bold text-white tracking-tight">GREVORO Steel Trading</h1><p className="text-slate-500 text-sm mt-1">Customer Orders &amp; Performance Dashboard</p></div>
                <div className="flex items-center gap-6 bg-slate-900 rounded-xl px-6 py-3 border border-slate-700">
                  <div className="text-center"><div className="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Total GMV</div><div className="text-xl font-bold text-white">{fmt(gmvT)}</div></div>
                  <div style={{width:"1px",height:"40px",background:"#334155"}}/>
                  <div className="text-center"><div className="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Executed</div><div className="text-xl font-bold text-emerald-400">{fmt(gmvB)}</div></div>
                  <div style={{width:"1px",height:"40px",background:"#334155"}}/>
                  <div className="text-center"><div className="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Unexecuted</div><div className="text-xl font-bold text-red-400">{fmt(gmvU)}</div></div>
                </div>
              </div>
              <div className="flex flex-wrap gap-2 mt-5">
                <Tab id="overview" label="Overview" icon={BarChart3}/>
                <Tab id="margins" label="CM1 & CM2" icon={TrendingUp}/>
                <Tab id="charts" label="Analytics" icon={PieIcon}/>
                <Tab id="orders" label="Order Book" icon={Table}/>
              </div>
            </div>
          </div>

          <div className="max-w-screen-xl mx-auto px-6 py-6">
            <div className="flex flex-wrap gap-6 mb-6 items-center">
              <Toggle on={showCancelled} onToggle={()=>setShowCancelled(!showCancelled)} label="Include Cancelled"/>
              <Toggle on={chartType==="qty"} onToggle={()=>setChartType(chartType==="value"?"qty":"value")} label="Show Qty instead of Value"/>
              <div className="ml-auto text-xs text-slate-600">{active.length} orders | {tQty.toFixed(0)} MT total qty</div>
            </div>

            {activeTab==="overview"&&(<div className="space-y-6">
              <div className="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-8 gap-3">
                <KPI label="Total GMV" value={fmt(gmvT)} sub={`${active.length} POs`} icon={DollarSign}/>
                <KPI label="Executed" value={fmt(gmvB)} sub={`${exPct}% of GMV`} icon={TrendingUp}/>
                <KPI label="Unexecuted" value={fmt(gmvU)} sub={`${(100-exPct).toFixed(1)}% pending`} icon={TrendingDown}/>
                <KPI label="Execution %" value={`${exPct}%`} sub={`${tQty.toFixed(0)} MT`} icon={Package}/>
                <KPI label="Gross Spread" value={fmt(DUMP.grossSpread)} sub={`${DUMP.spreadPct}% margin`} icon={TrendingUp}/>
                <KPI label="Collection %" value={`${DUMP.collectionPct}%`} sub={fmt(DUMP.totalCollected)}/>
                <KPI label="Supplier Cycle" value={`${DUMP.avgPayCycle} days`} sub="Avg payment" icon={Clock}/>
                <KPI label="Customer Cycle" value={`${DUMP.avgReceiptCycle} days`} sub="Avg receipt" icon={Truck}/>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Executed vs Unexecuted</h3>
                  <ResponsiveContainer width="100%" height={280}>
                    <PieChart><Pie data={[{name:"Executed",value:gmvB},{name:"Unexecuted",value:gmvU}]} cx="50%" cy="50%" innerRadius={70} outerRadius={110} paddingAngle={3} dataKey="value" stroke="none"><Cell fill="#10b981"/><Cell fill="#ef4444"/></Pie><Tooltip formatter={v=>fmtFull(v)} contentStyle={ts}/><Legend wrapperStyle={{color:"#94a3b8"}}/></PieChart>
                  </ResponsiveContainer>
                  <div className="flex justify-center gap-8 mt-2"><div className="text-center"><div className="text-emerald-400 text-lg font-bold">{fmt(gmvB)}</div><div className="text-slate-500 text-xs">Executed</div></div><div className="text-center"><div className="text-red-400 text-lg font-bold">{fmt(gmvU)}</div><div className="text-slate-500 text-xs">Pending</div></div></div>
                </div>
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Order Status</h3>
                  <ResponsiveContainer width="100%" height={280}>
                    <PieChart><Pie data={Object.entries(stCounts).map(([k,v])=>({name:k,value:v}))} cx="50%" cy="50%" outerRadius={110} paddingAngle={2} dataKey="value" stroke="none">{Object.keys(stCounts).map((k,i)=><Cell key={i} fill={STATUS_COLORS[k]||PALETTE[i]}/>)}</Pie><Tooltip contentStyle={ts}/><Legend wrapperStyle={{color:"#94a3b8"}}/></PieChart>
                  </ResponsiveContainer>
                  <div className="flex justify-center gap-4 mt-2">{Object.entries(stCounts).map(([k,v])=>(<div key={k} className="text-center"><div className="text-lg font-bold" style={{color:STATUS_COLORS[k]}}>{v}</div><div className="text-slate-500 text-xs">{k}</div></div>))}</div>
                </div>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Monthly Buy vs Sell (Dump)</h3>
                  <ResponsiveContainer width="100%" height={280}><BarChart data={MONTHLY}><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis dataKey="month" stroke="#64748b" tick={{fontSize:12}}/><YAxis stroke="#64748b" tickFormatter={v=>`${(v/1e7).toFixed(0)}Cr`} tick={{fontSize:11}}/><Tooltip formatter={v=>fmtFull(v)} contentStyle={ts}/><Legend wrapperStyle={{color:"#94a3b8"}}/><Bar dataKey="buyValue" fill="#3b82f6" name="Purchase" radius={[6,6,0,0]}/><Bar dataKey="sellValue" fill="#10b981" name="Sales" radius={[6,6,0,0]}/></BarChart></ResponsiveContainer>
                </div>
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                  <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Customer-wise {chartType==="qty"?"Qty (MT)":"Order Value"}</h3>
                  <ResponsiveContainer width="100%" height={280}><BarChart data={custSum} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis type="number" stroke="#64748b" tickFormatter={v=>chartType==="qty"?v:`${(v/1e7).toFixed(0)}Cr`} tick={{fontSize:11}}/><YAxis dataKey="name" type="category" stroke="#64748b" width={130} tick={{fontSize:11}}/><Tooltip formatter={v=>chartType==="qty"?`${v.toFixed(1)} MT`:fmtFull(v)} contentStyle={ts}/><Bar dataKey={chartType==="qty"?"qty":"value"} radius={[0,6,6,0]}>{custSum.map((e,i)=><Cell key={i} fill={PALETTE[i%PALETTE.length]}/>)}</Bar></BarChart></ResponsiveContainer>
                </div>
              </div>
            </div>)}

            {activeTab==="margins"&&(<div className="space-y-6">
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <div className="bg-slate-800 rounded-xl p-5 border border-blue-900"><p className="text-blue-400 text-xs font-semibold uppercase tracking-wider mb-2">CM1 Value</p><p className="text-white text-2xl font-bold">{fmt(cm.c1)}</p><p className="text-blue-400 text-xs mt-1 opacity-60">on {fmt(cm.bw)} billed</p></div>
                <div className="bg-slate-800 rounded-xl p-5 border border-blue-900"><p className="text-blue-400 text-xs font-semibold uppercase tracking-wider mb-2">Weighted CM1 %</p><p className="text-white text-2xl font-bold">{cm.c1p}%</p><p className="text-blue-400 text-xs mt-1 opacity-60">across {cm.n} orders</p></div>
                <div className="bg-slate-800 rounded-xl p-5 border border-emerald-900"><p className="text-emerald-400 text-xs font-semibold uppercase tracking-wider mb-2">CM2 Value</p><p className="text-white text-2xl font-bold">{fmt(cm.c2)}</p><p className="text-emerald-400 text-xs mt-1 opacity-60">on {fmt(cm.bw)} billed</p></div>
                <div className="bg-slate-800 rounded-xl p-5 border border-emerald-900"><p className="text-emerald-400 text-xs font-semibold uppercase tracking-wider mb-2">Weighted CM2 %</p><p className="text-white text-2xl font-bold">{cm.c2p}%</p><p className="text-emerald-400 text-xs mt-1 opacity-60">net margin</p></div>
                <div className="bg-slate-800 rounded-xl p-5 border border-purple-900"><p className="text-purple-400 text-xs font-semibold uppercase tracking-wider mb-2">CM1-CM2 Gap</p><p className="text-white text-2xl font-bold">{(cm.c1p-cm.c2p).toFixed(2)}%</p><p className="text-purple-400 text-xs mt-1 opacity-60">{fmt(cm.c1-cm.c2)} cost</p></div>
                <div className="bg-slate-800 rounded-xl p-5 border border-cyan-900"><p className="text-cyan-400 text-xs font-semibold uppercase tracking-wider mb-2">Dump Spread</p><p className="text-white text-2xl font-bold">{fmt(DUMP.grossSpread)}</p><p className="text-cyan-400 text-xs mt-1 opacity-60">{DUMP.spreadPct}% on {fmt(DUMP.totalBuy)}</p></div>
              </div>
              <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                <h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">CM1 vs CM2 by PO</h3>
                <ResponsiveContainer width="100%" height={350}><BarChart data={active.filter(o=>o.cm1Pct!=null).map(o=>({po:o.poNumber.length>10?o.poNumber.slice(-10):o.poNumber,cm1Pct:o.cm1Pct,cm2Pct:o.cm2Pct,billed:o.billed,customer:o.customer}))}><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis dataKey="po" stroke="#64748b" tick={{fontSize:10}} angle={-30} textAnchor="end" height={60}/><YAxis stroke="#64748b" tick={{fontSize:11}}/><Tooltip contentStyle={ts} formatter={(v,name)=>`${v}%`}/><Legend wrapperStyle={{color:"#94a3b8"}}/><Bar dataKey="cm1Pct" fill="#3b82f6" name="CM1 %" radius={[4,4,0,0]}/><Bar dataKey="cm2Pct" fill="#10b981" name="CM2 %" radius={[4,4,0,0]}/></BarChart></ResponsiveContainer>
              </div>
              <div className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                <div className="px-6 py-4 border-b border-slate-700"><h3 className="text-sm font-bold text-white uppercase tracking-wider">Order-wise CM Breakdown</h3><p className="text-slate-500 text-xs mt-1">CM Value = Billed x CM% / 100</p></div>
                <div className="overflow-x-auto"><table className="w-full text-sm"><thead className="bg-slate-900"><tr>{["PO Number","Customer","Status","Billed","CM1 %","CM1 Value","CM2 %","CM2 Value","CM1-CM2 Gap"].map(h=>(<th key={h} className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">{h}</th>))}</tr></thead><tbody>
                  {active.filter(o=>o.cm1Pct!=null).map((o,i)=>{const c1v=o.billed*o.cm1Pct/100,c2v=o.billed*(o.cm2Pct||0)/100;return(<tr key={i} className="border-b border-slate-700 hover:bg-slate-700 transition"><td className="px-4 py-3 text-blue-400 font-semibold">{o.poNumber}</td><td className="px-4 py-3">{o.customer}</td><td className="px-4 py-3"><span className={`px-2 py-0.5 rounded text-xs font-semibold ${sc(o.orderStatus)}`}>{o.orderStatus}</span></td><td className="px-4 py-3 font-semibold">{fmtFull(o.billed)}</td><td className="px-4 py-3 text-blue-400 font-bold">{o.cm1Pct}%</td><td className="px-4 py-3 text-blue-300">{fmtFull(c1v)}</td><td className="px-4 py-3 text-emerald-400 font-bold">{o.cm2Pct}%</td><td className="px-4 py-3 text-emerald-300">{fmtFull(c2v)}</td><td className="px-4 py-3 text-purple-400">{fmtFull(c1v-c2v)}</td></tr>)})}
                  <tr className="bg-slate-900 font-bold"><td className="px-4 py-3" colSpan={3}>TOTAL</td><td className="px-4 py-3">{fmtFull(cm.bw)}</td><td className="px-4 py-3 text-blue-400">{cm.c1p}%</td><td className="px-4 py-3 text-blue-300">{fmtFull(cm.c1)}</td><td className="px-4 py-3 text-emerald-400">{cm.c2p}%</td><td className="px-4 py-3 text-emerald-300">{fmtFull(cm.c2)}</td><td className="px-4 py-3 text-purple-400">{fmtFull(cm.c1-cm.c2)}</td></tr>
                </tbody></table></div>
              </div>
            </div>)}

            {activeTab==="charts"&&(<div className="space-y-6">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Product Mix</h3><ResponsiveContainer width="100%" height={300}><PieChart><Pie data={prodMix} cx="50%" cy="50%" innerRadius={50} outerRadius={100} paddingAngle={3} dataKey="value" stroke="none">{prodMix.map((e,i)=><Cell key={i} fill={PALETTE[i]}/>)}</Pie><Tooltip formatter={v=>chartType==="qty"?`${v.toFixed(1)} MT`:fmtFull(v)} contentStyle={ts}/><Legend wrapperStyle={{color:"#94a3b8"}}/></PieChart></ResponsiveContainer></div>
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Payment Type</h3><ResponsiveContainer width="100%" height={300}><PieChart><Pie data={payTypes} cx="50%" cy="50%" innerRadius={50} outerRadius={100} paddingAngle={2} dataKey="value" stroke="none">{payTypes.map((e,i)=><Cell key={i} fill={PALETTE[i]}/>)}</Pie><Tooltip formatter={v=>fmtFull(v)} contentStyle={ts}/><Legend wrapperStyle={{color:"#94a3b8",fontSize:"12px"}}/></PieChart></ResponsiveContainer></div>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Top 10 Suppliers (Purchase)</h3><ResponsiveContainer width="100%" height={320}><BarChart data={SUPPLIERS_BUY} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis type="number" stroke="#64748b" tickFormatter={v=>`${(v/1e7).toFixed(0)}Cr`} tick={{fontSize:11}}/><YAxis dataKey="name" type="category" stroke="#64748b" width={120} tick={{fontSize:10}}/><Tooltip formatter={v=>fmtFull(v)} contentStyle={ts}/><Bar dataKey="value" fill="#ef4444" radius={[0,6,6,0]} name="Buy Value"/></BarChart></ResponsiveContainer></div>
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">State-wise Order Value</h3><ResponsiveContainer width="100%" height={320}><BarChart data={stateSum}><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis dataKey="state" stroke="#64748b" tick={{fontSize:11}}/><YAxis stroke="#64748b" tickFormatter={v=>`${(v/1e7).toFixed(0)}Cr`} tick={{fontSize:11}}/><Tooltip formatter={v=>fmtFull(v)} contentStyle={ts}/><Bar dataKey="value" fill="#06b6d4" radius={[6,6,0,0]} name="Order Value"/></BarChart></ResponsiveContainer></div>
              </div>
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">LC Status</h3><ResponsiveContainer width="100%" height={280}><PieChart><Pie data={lcCounts} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} dataKey="value" stroke="none" label={({name,value})=>`${value}`} labelLine={false}>{lcCounts.map((e,i)=><Cell key={i} fill={["#10b981","#ef4444","#f59e0b","#64748b"][i]||PALETTE[i]}/>)}</Pie><Tooltip contentStyle={ts} formatter={(v,name)=>[`${v} orders`,name]}/><Legend wrapperStyle={{color:"#94a3b8",fontSize:"12px"}}/></PieChart></ResponsiveContainer></div>
                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700"><h3 className="text-sm font-bold text-white mb-4 uppercase tracking-wider">Customer Execution Rate</h3><ResponsiveContainer width="100%" height={280}><BarChart data={custSum.map(c=>({...c,execPct:c.value>0?(c.billed/c.value*100):0}))}><CartesianGrid strokeDasharray="3 3" stroke="#334155"/><XAxis dataKey="name" stroke="#64748b" tick={{fontSize:10}}/><YAxis stroke="#64748b" domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:11}}/><Tooltip formatter={v=>`${v.toFixed(1)}%`} contentStyle={ts}/><Bar dataKey="execPct" fill="#8b5cf6" radius={[6,6,0,0]} name="Execution %"/></BarChart></ResponsiveContainer></div>
              </div>
            </div>)}

            {activeTab==="orders"&&(<div className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
              <div className="p-5 border-b border-slate-700">
                <div className="flex items-center gap-2 mb-4"><Filter size={16} className="text-slate-500"/><h3 className="text-sm font-bold text-white uppercase tracking-wider">Filter Orders</h3></div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3">
                  <select value={filters.customer} onChange={e=>setFilters({...filters,customer:e.target.value})} className="bg-slate-900 text-white rounded-lg px-3 py-2.5 border border-slate-700 focus:border-blue-500 focus:outline-none text-sm">{uCust.map(c=><option key={c}>{c}</option>)}</select>
                  <select value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})} className="bg-slate-900 text-white rounded-lg px-3 py-2.5 border border-slate-700 focus:border-blue-500 focus:outline-none text-sm">{uStat.map(s=><option key={s}>{s}</option>)}</select>
                  <select value={filters.product} onChange={e=>setFilters({...filters,product:e.target.value})} className="bg-slate-900 text-white rounded-lg px-3 py-2.5 border border-slate-700 focus:border-blue-500 focus:outline-none text-sm">{uProd.map(p=><option key={p}>{p}</option>)}</select>
                  <div className="relative lg:col-span-2" style={{position:"relative"}}><Search size={16} style={{position:"absolute",left:"12px",top:"12px",color:"#64748b"}}/><input type="text" placeholder="Search PO number..." value={searchPO} onChange={e=>setSearchPO(e.target.value)} className="w-full bg-slate-900 text-white rounded-lg px-3 py-2.5 border border-slate-700 focus:border-blue-500 focus:outline-none text-sm" style={{paddingLeft:"36px"}}/></div>
                </div>
              </div>
              <div className="overflow-x-auto"><table className="w-full text-sm"><thead className="bg-slate-900"><tr>
                <th className="px-3 py-3 text-left"><SH label="#" k="slNo"/></th><th className="px-3 py-3 text-left"><SH label="Customer" k="customer"/></th><th className="px-3 py-3 text-left"><SH label="PO Number" k="poNumber"/></th><th className="px-3 py-3 text-left"><SH label="Status" k="orderStatus"/></th><th className="px-3 py-3 text-left"><SH label="Date" k="poDate"/></th><th className="px-3 py-3 text-left"><SH label="Ship To" k="shipToCity"/></th><th className="px-3 py-3 text-right"><SH label="Qty" k="qty" align="right"/></th><th className="px-3 py-3 text-right"><SH label="PO Value" k="value" align="right"/></th><th className="px-3 py-3 text-right"><SH label="Billed" k="billed" align="right"/></th><th className="px-3 py-3 text-right"><SH label="Unexecuted" k="unexecuted" align="right"/></th><th className="px-3 py-3 text-right">Exec %</th><th className="px-3 py-3 text-left"><SH label="Product" k="product"/></th><th className="px-3 py-3 text-center">CM1%</th><th className="px-3 py-3 text-center">CM2%</th>
              </tr></thead><tbody>
                {filtered.map((o,i)=>{const ep=o.value>0?(o.billed/o.value*100).toFixed(1):"0.0";return(
                  <tr key={i} onClick={()=>setExpandedRow(expandedRow===i?null:i)} className={`border-b border-slate-700 cursor-pointer transition ${expandedRow===i?"bg-slate-700":"hover:bg-slate-700"}`} style={{opacity:expandedRow===i?1:undefined}}>
                    <td className="px-3 py-2.5 text-slate-500">{o.slNo}</td><td className="px-3 py-2.5 font-medium">{o.customer}</td><td className="px-3 py-2.5 text-blue-400 font-semibold text-xs">{o.poNumber}</td><td className="px-3 py-2.5"><span className={`px-2 py-0.5 rounded text-xs font-semibold ${sc(o.orderStatus)}`}>{o.orderStatus}</span></td><td className="px-3 py-2.5 text-slate-500 text-xs">{o.poDate}</td><td className="px-3 py-2.5 text-xs">{o.shipToCity}</td><td className="px-3 py-2.5 text-right">{o.qty}</td><td className="px-3 py-2.5 text-right font-semibold">{fmtFull(o.value)}</td><td className="px-3 py-2.5 text-right text-emerald-400 font-semibold">{fmtFull(o.billed)}</td><td className="px-3 py-2.5 text-right text-red-400 font-semibold">{fmtFull(o.unexecuted)}</td><td className="px-3 py-2.5 text-right"><span className={`font-bold ${parseFloat(ep)>=80?"text-emerald-400":parseFloat(ep)>=50?"text-amber-400":"text-red-400"}`}>{ep}%</span></td><td className="px-3 py-2.5 text-xs">{o.product||"-"}</td><td className="px-3 py-2.5 text-center text-blue-400 font-bold">{o.cm1Pct!=null?`${o.cm1Pct}%`:"-"}</td><td className="px-3 py-2.5 text-center text-emerald-400 font-bold">{o.cm2Pct!=null?`${o.cm2Pct}%`:"-"}</td>
                  </tr>)})}
              </tbody></table></div>
              <div className="px-5 py-3 bg-slate-900 border-t border-slate-700 flex flex-wrap justify-between items-center gap-2">
                <span className="text-slate-500 text-xs">Showing {filtered.length} of {active.length} orders</span>
                <div className="flex gap-4 text-xs"><span className="text-slate-400">Value: <span className="text-white font-bold">{fmt(filtered.reduce((s,o)=>s+o.value,0))}</span></span><span className="text-slate-400">Billed: <span className="text-emerald-400 font-bold">{fmt(filtered.reduce((s,o)=>s+o.billed,0))}</span></span><span className="text-slate-400">Unexecuted: <span className="text-red-400 font-bold">{fmt(filtered.reduce((s,o)=>s+o.unexecuted,0))}</span></span></div>
              </div>
            </div>)}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CustomerDashboard />);
  </script>
</body>
</html>
